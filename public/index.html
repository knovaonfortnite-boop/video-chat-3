<!DOCTYPE html>
<html>
<head>
  <title>Mustang Chat</title>
  <style>
    body { display: flex; font-family: Arial; }
    #sidebar { width: 200px; background: #36393f; color: white; padding: 10px; }
    #chat { flex: 1; padding: 10px; }
    #messages { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 5px; margin-bottom: 10px; }
    input, button { margin: 3px 0; width: 100%; }
  </style>
</head>
<body>
  <div id="login">
    <input id="nickname" placeholder="Enter nickname">
    <button onclick="setNickname()">Join Chat</button>
  </div>

  <div id="app" style="display:none;">
    <div id="sidebar">
      <h3>Public Chat</h3>
      <input id="message" placeholder="Type message">
      <button onclick="sendMessage()">Send Public</button>

      <h3>Private Message</h3>
      <input id="target" placeholder="Recipient nickname">
      <input id="privateMessage" placeholder="Type private message">
      <button onclick="sendPrivate()">Send Private</button>
    </div>

    <div id="chat">
      <div id="messages"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
