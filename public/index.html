<!DOCTYPE html>
<html>
<head>
  <title>Mustang Chat</title>
  <style>
    body { display: flex; font-family: Arial; }
    #sidebar { width: 200px; background: #36393f; color: white; }
    #chat { flex: 1; }
    #messages { height: 300px; overflow-y: scroll; }
  </style>
</head>
<body>
  <div id="login">
    <input id="first" placeholder="First Name">
    <input id="last" placeholder="Last Name">
    <input id="pw" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
  <div id="app" style="display:none;">
    <div id="sidebar">
      <h3>Servers</h3>
      <div id="servers"></div>
      <h3>DMs</h3>
      <div id="dms"></div>
    </div>
    <div id="chat">
      <div id="messages"></div>
      <div id="typing" style="height:20px;font-size:12px;color:gray;"></div>
      <input id="message" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
      <button onclick="startVoice()">Join Voice</button>
      <video id="localVideo" autoplay muted></video>
      <video id="remoteVideo" autoplay></video>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
