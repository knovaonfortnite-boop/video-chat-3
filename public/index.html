<!DOCTYPE html>
<html>
<head>
  <title>Mustang Chat</title>
  <style>
    body {
      display: flex;
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #36393f; /* Discord dark theme */
      color: #dcddde;
      height: 100vh;
      overflow: hidden;
    }
    #sidebar {
      width: 240px;
      background: #2f3136;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }
    #servers {
      flex: 0 0 auto;
      margin-bottom: 20px;
    }
    #channels {
      flex: 1;
      overflow-y: auto;
    }
    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #messages {
      flex: 1;
      overflow-y: scroll;
      padding: 10px;
      background: #36393f;
    }
    .message {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .pfp {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #7289da; /* Discord blue for initials */
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .message-content {
      flex: 1;
    }
    .message-user {
      font-weight: bold;
      color: #ffffff;
    }
    #input-area {
      padding: 10px;
      background: #40444b;
      display: flex;
    }
    #message {
      flex: 1;
      background: #40444b;
      border: 1px solid #202225;
      color: #dcddde;
      padding: 10px;
      border-radius: 5px;
    }
    #send-btn {
      background: #7289da;
      color: white;
      border: none;
      padding: 10px;
      margin-left: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    #voice-controls {
      position: fixed;
      bottom: 0;
      left: 240px;
      right: 0;
      background: #292b2f;
      padding: 10px;
      display: flex;
      align-items: center;
    }
    #voice-controls button {
      background: #43b581;
      color: white;
      border: none;
      padding: 8px 12px;
      margin-right: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    #video-container {
      display: flex;
      justify-content: space-around;
      margin-top: 10px;
    }
    video {
      width: 200px;
      height: 150px;
      background: black;
      border-radius: 5px;
    }
    #login {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #202225;
      padding: 20px;
      border-radius: 5px;
      z-index: 10;
    }
    #login input, #login button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }
    #private-section {
      margin-top: 20px;
    }
    /* Scrollbar styling like Discord */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background: #202225;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="login">
    <input id="nickname" placeholder="Enter nickname">
    <button onclick="setNickname()">Join Chat</button>
  </div>

  <div id="app" style="display:none; width: 100%; height: 100%;">
    <div id="sidebar">
      <div id="servers">
        <h3 style="color: #8e9297;">Servers</h3>
        <!-- For simplicity, static 'Public' server; expand for real servers -->
        <p style="cursor: pointer;" onclick="switchChannel('public')">Public Chat</p>
      </div>
      <div id="channels">
        <h3 style="color: #8e9297;">DMs / Private</h3>
        <div id="users"></div> <!-- Online users for DMs -->
        <div id="private-section">
          <input id="target" placeholder="Recipient nickname">
          <input id="privateMessage" placeholder="Type private message">
          <button onclick="sendPrivate()">Send Private</button>
        </div>
      </div>
    </div>

    <div id="chat">
      <div id="messages"></div>
      <div id="input-area">
        <input id="message" placeholder="Type a message...">
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>

    <div id="voice-controls">
      <button onclick="startVoiceCall()">Start Voice/Video Call</button>
      <div id="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
